<html>
<body id=idbd>
<style>

#idbd
{
 background:linear-gradient( #f60,#ff0);
}

select
{
 cursor:pointer;
}

.hd
{
 position:absolute;
 transition:1s;
 text-align:center;
 font-size:1.4em;
 padding-top: 11px;
}

.prjct
{
 position:absolute;
 transition:1s;
}

.drns
{
 position:absolute;
 transition:1s;
 z-index:1;
}

.tms
{
 position:absolute;
 transition: 1s;
 text-align:center;
 font-size:1.5em;
}

.srvr,.vctr
{
 position:absolute;
 transition:1s;
 font-size:1.5em;
}

</style>

<div class=hd>
 <div class=hd>past</div>
 <div class=hd>present</div>
 <div class=hd>future</div>
 <div class=prjct>project</div>
  <div class=prjct></div>
</div>

<div class=tms>
 <select class=tms id=idsl >
  <option>indefinite</option>
  <option>continuous</option>
  <option>perfect</option>
  <option>perfect continuous</option>  
 </select>
 <div class=tms >future in the past</div>
 
</div>

<script>
hd=document.getElementsByClassName('hd') 
prjct=document.getElementsByClassName('prjct')
tms=document.getElementsByClassName('tms')
 
function inn(nm,i,l,t,w,h,bkgr) 
{
 nm[i].style.left=l+'%'
 nm[i].style.top=t+'%'
 nm[i].style.width=w+'%'
 nm[i].style.height=h+'%'
 nm[i].style.background=bkgr
}
  
inn(hd,0, 1,1, 98,35,'radial-gradient(#f00,#000)') 
inn(hd,1, 11,22, 22,22,'#777')
 hd[1].style.cursor='pointer'
inn(hd,2, 37,22, 22,22,'#0ff')
 hd[2].style.cursor='pointer'
inn(hd,3, 65,22, 22,22,'#ff0')
 hd[3].style.cursor='pointer'
 
inn(prjct,0, 11,55, 0,0,'')
 prjct[0].style.zIndex=1
 prjct[0].style.color='#ff0'
 prjct[0].style.transform='scale(4)'
 prjct[0].style.cursor='pointer'
inn(prjct,1, 30,55, 0,0,'')
 prjct[1].style.zIndex=1
 prjct[1].style.color='#0ff'
 prjct[1].style.transform='scale(0)'
 prjct[1].style.cursor='pointer'
 
inn(tms,0, 1,37, 98,62,'radial-gradient(#0f0,#000)')
 tms[0].style.zIndex=0
inn(tms,1, 33,11, 44,22,'#777')
 tms[1].style.cursor='pointer'
inn(tms,2, 3,11, 22,33,'#f00')
 tms[2].style.cursor='pointer'
   
Icl=0 
bcl=0
function cl()
{
 prjct[0].style.transform='scale('+(4+Math.random())+') '
 if(bcl){
  hd[2].style.transform='scale(1)'
  hd[1].style.transform='scale(1.2)'
  hd[3].style.transform='scale(1.2)'
	}else{
  hd[2].style.transform='scale(1.2)'
  hd[1].style.transform='scale(1)'
  hd[3].style.transform='scale(1)'
 }
  bcl=!bcl	 
}
    Icl=setInterval(cl,999)
 
function act(i,l)
{ 
 hd[i].onmouseover=()=>
 {  
  hd[i].style.zIndex=1 
  hd[i].style.border='4px ridge #f60'
  hd[i].style.borderRadius=22+'%'
 if(i==1){ 
  hd[2].style.zIndex=0
  hd[3].style.zIndex=0 
  switch(idsl.value)
  { 
   case 'indefinite':  
    hd[i].innerHTML='I did ...'
	     break;
   case 'continuous':  
    hd[i].innerHTML='I was doing ...'
	     break;
   case 'perfect':  
    hd[i].innerHTML='I had done ...'
	     break;		
   case 'perfect continuous':  
    hd[i].innerHTML='I had been doing ...'
	     break;		   
   }
  hd[i].style.color='#fff'
 }
 if(i==2){ 
  hd[1].style.zIndex=0
  hd[3].style.zIndex=0
  switch(idsl.value)
  { 
   case 'indefinite':  
    hd[i].innerHTML='I do ...'
	       break;
   case 'continuous':  
    hd[i].innerHTML='I am doing ...'
	       break;
   case 'perfect':  
    hd[i].innerHTML='I have done ...'
	       break;				   
   case 'perfect continuous':  
    hd[i].innerHTML='I have been doing ...'
	       break;						
  }
  hd[i].style.color='#f00'   
 }
 if(i==3){ 
  hd[2].style.zIndex=0
  hd[1].style.zIndex=0
  switch(idsl.value)
  { 
   case 'indefinite':  
    hd[i].innerHTML='I will do ...'
   break;
   case 'continuous':  
    hd[i].innerHTML='I will doing ...'
   break;
   case 'perfect':  
    hd[i].innerHTML='I will have done ...'
   break;				   
   case 'perfect continuous':  
    hd[i].innerHTML='I will have been doing...'
   break;		   
  }
  hd[i].style.color='#f0f'
  }
  hd[i].style.transform='scale(2)'
   clearInterval(Icl) 
 }	  
 hd[i].onmouseout=()=>
 {
  hd[i].style.width='22%'
  hd[i].style.height='22%'
  hd[i].style.left=l+'%'
  hd[i].style.top='22%'
  hd[i].style.fontSize='1.4em'
  hd[i].style.color='#000'
  hd[i].style.border='none'
  hd[i].style.borderRadius=0+'%'
  hd[1].innerHTML='past'
  hd[2].innerHTML='present'
  hd[3].innerHTML='future' 
   cl()
   Icl=setInterval(cl, 999)
 }
}	
  act(1,11)
  act(2,37)
  act(3,65)
	
pr1I=0		
bpr1=0	
prjct[0].onmouseover=()=>
{
 prjct[0].style.transform='scale(4) translate(22%)'
  prjct[0].innerHTML='@intrface<br> @implemnttn'
  prjct[1].innerHTML='initialization'
 pr1I=setInterval(()=>{
  if(bpr1)
  {
   prjct[1].style.top='55%'
   prjct[1].style.transform='scale(6)'
   prjct[1].innerHTML='initialization'
  }
   else
  {
   prjct[1].style.top='77%'
   prjct[1].style.transform=
    'scale(6)  translate(333%)'
    prjct[1].innerHTML='realisation'  
  }
    bpr1=!bpr1
  },999)
}
prjct[0].onmouseout=()=>
{
 prjct[0].style.transform='scale(4)'
  prjct[0].innerHTML='project'
 prjct[1].style.transform='scale(0)'
  clearInterval(pr1I)
}      
				 
tms[2].onmouseover=()=>
{
 tms[2].style.zIndex=2
 tms[2].style.color='#fff'
 tms[2].style.border='6px ridge #f60'
 tms[2].style.borderRadius=33+'%'
 tms[2].style.transform=
  'scale(2) translate(22%,0)'
  tms[2].innerHTML='I thought I would be tomorrow'
}
tms[2].onmouseout=()=>
{
 tms[2].style.color='#000'
 tms[2].style.border='none'
 tms[2].style.borderRadius=0+'%'
 tms[2].style.transform='scale(1)'
  tms[2].innerHTML='future in the past'
}			
 // Math.round(Math.random())
</script>
</body>
</html>
